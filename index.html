<!DOCTYPE html>
<html>
 <head>
   <meta charset="utf-8">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w==" crossorigin="anonymous" referrerpolicy="no-referrer" />

 </head>
 <body>

      <button class="item numbers">2</button>
      <button class="item numbers">3</button>
      <button class="item action">+</button>
      <button class="item numbers zero">0</button>
      <button class="item numbers">.</button>
      <button class="item res action">=</button>  
    </div>
  </div>
    <script src="JavaScript.js"></script>

</html>
